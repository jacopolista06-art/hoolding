<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#060606;font-family:'Montserrat',sans-serif;color:#F5F2EE}

#canvas{position:fixed;inset:0;z-index:0}

.stage{
position:relative;z-index:1;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
height:100vh;
opacity:1;
transition:opacity 1s ease;
}
.stage.fade-out{opacity:0}

/* LOGHI */
.logos{
display:flex;align-items:center;gap:3.5rem;
margin-bottom:3.5rem;
perspective:900px;
}
.logo-item{
display:flex;flex-direction:column;align-items:center;gap:0.9rem;
opacity:0;
animation:emerge 1.4s cubic-bezier(.16,1,.3,1) forwards;
}
.logo-item:nth-child(1){animation-delay:0.3s}
.logo-item:nth-child(2){animation-delay:0.85s}
.logo-item:nth-child(3){animation-delay:1.4s}
@keyframes emerge{
0%  {opacity:0;transform:translateZ(-600px) scale(0.1) rotateY(30deg)}
55% {opacity:1;transform:translateZ(30px)  scale(1.06) rotateY(-4deg)}
100%{opacity:1;transform:translateZ(0)     scale(1)    rotateY(0deg)}
}
.logo-item svg{
filter:drop-shadow(0 0 18px rgba(197,160,40,0.55));
}
.logo-name{
font-family:‘Cormorant Garamond’,serif;
font-size:0.68rem;font-weight:300;
letter-spacing:0.22em;text-transform:uppercase;
color:#E2C060;text-align:center;line-height:1.5;
}
.sep{width:1px;height:56px;background:linear-gradient(to bottom,transparent,#C5A028,transparent);opacity:0;animation:fi 0.6s 1.1s ease forwards}
@keyframes fi{to{opacity:0.6}}

/* TITOLO */
.main-title{
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(2.8rem,7vw,5.5rem);
font-weight:300;letter-spacing:0.06em;
text-align:center;line-height:1;
opacity:0;
animation:titleUp 1.2s 1.9s cubic-bezier(.16,1,.3,1) forwards;
text-shadow:0 0 80px rgba(197,160,40,0.2);
}
@keyframes titleUp{
0%  {opacity:0;transform:translateY(40px)}
100%{opacity:1;transform:translateY(0)}
}
.sub-title{
font-size:0.55rem;font-weight:300;
letter-spacing:0.55em;text-transform:uppercase;
color:#888077;text-align:center;
margin-top:1.2rem;
opacity:0;animation:fi 1s 2.4s ease forwards;
}
.divider{
width:60px;height:1px;
background:linear-gradient(to right,transparent,#C5A028,transparent);
margin:1.8rem auto 0;
opacity:0;animation:fi 0.8s 2.6s ease forwards;
}

/* SKIP */
.skip-btn{
position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);
font-size:0.48rem;letter-spacing:0.45em;text-transform:uppercase;
color:rgba(197,160,40,0.35);
background:transparent;border:none;cursor:pointer;
opacity:0;animation:fi 0.8s 3s ease forwards;
transition:color 0.3s;
}
.skip-btn:hover{color:#C5A028}

/* BARRA PROGRESSO */
.progress{
position:fixed;bottom:0;left:0;
height:2px;background:#C5A028;
width:0;
animation:prog 4.8s 0.3s linear forwards;
}
@keyframes prog{to{width:100%}}
</style>

</head>
<body>

<canvas id="canvas"></canvas>

<script>
// Particelle canvas
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const cx = canvas.width / 2;
const cy = canvas.height / 2;

for(let i = 0; i < 120; i++){
  const angle = Math.random() * Math.PI * 2;
  const speed = 1.5 + Math.random() * 3.5;
  const size = 0.8 + Math.random() * 2.5;
  const delay = Math.random() * 2000;
  particles.push({
    x: cx, y: cy,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    size,
    alpha: 0,
    maxAlpha: 0.4 + Math.random() * 0.6,
    born: Date.now() + delay,
    life: 2500 + Math.random() * 2000,
    dead: false
  });
}

function drawParticles(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const now = Date.now();
  particles.forEach(p => {
    if(now < p.born) return;
    const age = now - p.born;
    if(age > p.life){ p.dead = true; return; }
    const progress = age / p.life;
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.99;
    p.vy *= 0.99;
    p.alpha = progress < 0.2
      ? (progress / 0.2) * p.maxAlpha
      : p.maxAlpha * (1 - (progress - 0.2) / 0.8);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(197,160,40,${Math.max(0, p.alpha)})`;
    ctx.fill();
  });
  if(!particles.every(p => p.dead)) requestAnimationFrame(drawParticles);
}
drawParticles();

// Redirect automatico
let redirectTimer = setTimeout(goToSite, 5200);

function goToSite(){
  clearTimeout(redirectTimer);
  document.getElementById('stage').classList.add('fade-out');
  setTimeout(() => { window.location.href = 'sito.html'; }, 900);
}
</script>
